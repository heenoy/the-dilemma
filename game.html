<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>决策矩阵</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="game-page">
    <div id="scan-vertical" class="scan-vertical" aria-hidden="true"></div>
    <div id="screen">
      <span class="screen-corner screen-corner--tl" aria-hidden="true"></span>
      <span class="screen-corner screen-corner--tr" aria-hidden="true"></span>
      <span class="screen-corner screen-corner--bl" aria-hidden="true"></span>
      <span class="screen-corner screen-corner--br" aria-hidden="true"></span>
      <header class="screen-bar screen-bar--top">
        <span class="screen-bar__label screen-bar__label--left">[VAULT-0 / DECISION_ENGINE]</span>
        <span class="screen-bar__divider"></span>
        <span class="screen-bar__label screen-bar__label--right">[SCENARIO: ACTIVE]</span>
      </header>
      <footer class="screen-bar screen-bar--bottom">
        <span class="screen-bar__label screen-bar__label--left" id="screen-bar-bl">[ROUND 01/20]</span>
        <span class="screen-bar__label screen-bar__label--right" id="screen-bar-br">[---]</span>
      </footer>
      <div id="screen-content">
        <canvas id="radar-canvas" aria-hidden="true"></canvas>
        <div id="app"></div>
      </div>
    </div>
    <script type="module" src="/src/game.js"></script>
  </body>
</html>
