<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VAULT-0</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="scan-vertical" class="scan-vertical" aria-hidden="true"></div>
    <div id="screen">
      <span class="screen-corner screen-corner--tl" aria-hidden="true"></span>
      <span class="screen-corner screen-corner--tr" aria-hidden="true"></span>
      <span class="screen-corner screen-corner--bl" aria-hidden="true"></span>
      <span class="screen-corner screen-corner--br" aria-hidden="true"></span>
      <header class="screen-bar screen-bar--top">
        <span class="screen-bar__label screen-bar__label--left" id="screen-bar-tl">[VAULT-0]</span>
        <span class="screen-bar__divider"></span>
        <span class="screen-bar__label screen-bar__label--right" id="screen-bar-tr">[SECURE_CHANNEL]</span>
      </header>
      <footer class="screen-bar screen-bar--bottom">
        <span class="screen-bar__label screen-bar__label--left" id="screen-bar-bl">[SYSTEM: ONLINE]</span>
        <span class="screen-bar__label screen-bar__label--right" id="screen-bar-br">[ENCRYPTION: ACTIVE]</span>
      </footer>
      <div id="screen-content">
        <div id="view-intro"></div>
        <div id="view-game" style="display: none">
          <canvas id="radar-canvas" aria-hidden="true"></canvas>
        </div>
        <div id="view-result" style="display: none"></div>
        <div id="app"></div>
      </div>
      <div id="launch-overlay" class="launch-overlay" aria-label="系统初始化">
        <h1 class="launch-overlay__title">VAULT-0</h1>
        <p class="launch-overlay__subtitle">CIVILIZATION STORAGE ENGINE</p>
        <hr class="launch-overlay__divider" aria-hidden="true" />
        <p class="launch-overlay__action">[ CLICK ANYWHERE TO INITIALIZE ]</p>
      </div>
      <div id="wake-overlay" class="wake-overlay" aria-label="系统唤醒">
        <p class="wake-prompt" aria-hidden="true">
          <span class="wake-prompt__chevron">&gt;</span><span class="wake-prompt__cursor">_</span>
        </p>
        <button type="button" id="wake-init-btn" class="wake-init-btn" hidden>
          [ INITIALIZE VAULT-0 ]
        </button>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
